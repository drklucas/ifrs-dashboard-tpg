<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas Moodle - TPG/IFRS</title>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252830;
      --surface3: #2f323c;
      --border: #363944;
      --text: #e4e5e9;
      --text-secondary: #9ca0ae;
      --text-dim: #6b7084;
      --accent: #6c9cfc;
      --red: #f87171;
      --red-dim: #f8717122;
      --orange: #fb923c;
      --orange-dim: #fb923c22;
      --yellow: #fbbf24;
      --yellow-dim: #fbbf2422;
      --green: #4ade80;
      --green-dim: #4ade8022;
    }

    [data-theme="light"] {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface2: #eef1f6;
      --surface3: #e2e6ef;
      --border: #d1d5db;
      --text: #1a1d27;
      --text-secondary: #4b5563;
      --text-dim: #9ca3af;
      --accent: #3b7af5;
      --red: #dc2626;
      --red-dim: #dc262618;
      --orange: #ea580c;
      --orange-dim: #ea580c18;
      --yellow: #b45309;
      --yellow-dim: #b4530918;
      --green: #16a34a;
      --green-dim: #16a34a18;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ── */

    .app {
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr auto;
      gap: 0;
      min-height: 100vh;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .topbar .meta {
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    .main {
      padding: 24px 28px;
      overflow-y: auto;
    }

    .sidebar {
      border-left: 1px solid var(--border);
      padding: 24px 20px;
      overflow-y: auto;
      background: var(--surface);
    }

    @media (max-width: 1080px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }
      .sidebar {
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }

    /* ── Tab Bar ── */

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .tab .count {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
    }

    .tab:not(.active) .count {
      background: var(--surface3);
      color: var(--text-dim);
    }

    /* ── Search ── */

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.85rem;
      outline: none;
    }

    .search-input:focus { border-color: var(--accent); }

    /* ── To-Do Items ── */

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      transition: background 0.12s;
      cursor: default;
    }

    .todo-item:hover { background: var(--surface); }

    .todo-body { flex: 1; min-width: 0; }

    .todo-title {
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .todo-title a {
      color: var(--text);
      text-decoration: none;
    }

    .todo-title a:hover { color: var(--accent); text-decoration: underline; }

    .todo-urgency {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .urgency-past { background: var(--surface3); color: var(--text-dim); }
    .urgency-today { background: var(--red-dim); color: var(--red); }
    .urgency-tomorrow { background: var(--orange-dim); color: var(--orange); }
    .urgency-soon { background: var(--orange-dim); color: var(--orange); }
    .urgency-week { background: var(--yellow-dim); color: var(--yellow); }
    .urgency-later { background: var(--green-dim); color: var(--green); }

    .todo-meta {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 2px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .todo-deadline {
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
      margin-top: 2px;
      padding-left: 8px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    /* ── Section headers ── */

    .section-header {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      padding: 16px 0 8px 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .section-header:first-child { padding-top: 0; }

    /* ── Materials ── */

    .materials-group {
      margin-bottom: 20px;
    }

    .materials-group h3 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      padding: 12px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }

    .material-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      transition: background 0.12s;
    }

    .material-item:hover { background: var(--surface); }

    .material-icon {
      font-size: 0.85rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .material-name {
      font-size: 0.85rem;
      flex: 1;
    }

    .material-name a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .material-name a:hover { color: var(--accent); }

    /* ── Calendar sidebar ── */

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .sidebar h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 0;
    }

    .cal-view-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      transition: color 0.15s, border-color 0.15s;
    }

    .cal-view-btn:hover {
      color: var(--text-secondary);
      border-color: var(--text-dim);
    }

    /* ── Theme toggle button ── */

    .theme-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .theme-btn:hover {
      color: var(--text-secondary);
      border-color: var(--text-dim);
    }

    .fc {
      --fc-bg-event-opacity: 0.9;
      --fc-border-color: var(--border);
      --fc-page-bg-color: var(--surface);
      --fc-neutral-bg-color: var(--surface2);
      --fc-today-bg-color: rgba(108, 156, 252, 0.08);
      --fc-event-text-color: #fff;
    }

    [data-theme="light"] .fc {
      --fc-today-bg-color: rgba(59, 122, 245, 0.06);
    }

    .fc .fc-toolbar { margin-bottom: 8px !important; }
    .fc .fc-toolbar-title { color: var(--text); font-size: 0.9rem !important; }
    .fc .fc-button {
      background: var(--surface2) !important;
      border-color: var(--border) !important;
      color: var(--text-secondary) !important;
      font-size: 0.75rem !important;
      padding: 2px 8px !important;
    }
    .fc .fc-button:hover { background: var(--surface3) !important; }
    .fc .fc-button-active { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
    .fc th { color: var(--text-dim); font-size: 0.7rem; padding: 4px 0 !important; }
    .fc td { border-color: var(--border); }
    .fc .fc-daygrid-day-number { color: var(--text-secondary); font-size: 0.75rem; padding: 2px 4px !important; }
    .fc .fc-col-header-cell { background: var(--surface2); }
    .fc .fc-daygrid-day-frame { min-height: 48px !important; }
    .fc .fc-event { font-size: 0.65rem !important; padding: 1px 3px !important; border-radius: 3px !important; }

    .legend {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 6px 10px;
      margin: 14px 0 0;
      font-size: 0.72rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-dim);
      min-width: 0;
      overflow: hidden;
    }

    .legend-item span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    @media (max-width: 800px) {
      .legend {
        grid-template-columns: 1fr;
      }
    }

    /* ── Footer ── */

    .footer {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 28px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .footer a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover { color: var(--text-secondary); }

    /* ── Scrollbars ── */

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>

    const NOW = new Date();
    const MS_DAY = 86400000;

    const COURSE_COLORS = ['#6c9cfc','#a78bfa','#f472b6','#4ade80','#fb923c','#fbbf24','#2dd4bf','#f87171','#818cf8','#e879f9'];
    const courseColorMap = {};
    DATA.courses.forEach((c, i) => { courseColorMap[c.id] = COURSE_COLORS[i % COURSE_COLORS.length]; });

    const ACTIONABLE_TYPES = new Set(['assignment', 'quiz', 'choice', 'feedback', 'workshop', 'lesson']);
    const MATERIAL_TYPES = new Set(['resource', 'link', 'page', 'folder', 'glossary', 'wiki', 'database', 'other']);
    const MATERIAL_ICONS = { resource: '📄', link: '🔗', page: '📝', folder: '📁', forum: '💬', glossary: '📖', wiki: '📚', database: '🗃️', other: '📎' };

    // ── Data helpers ──

    function getAllItems() {
      const all = [];
      DATA.courses.forEach(c => {
        c.activities.forEach(a => {
          all.push({ ...a, courseId: c.id, courseName: c.name, courseUrl: c.url });
        });
      });
      return all;
    }

    function urgency(due) {
      if (!due) return { key: 'nodate', label: '', cls: '' };
      const diff = (new Date(due) - NOW) / MS_DAY;
      if (diff < 0) return { key: 'past', label: 'Encerrada', cls: 'urgency-past' };
      if (diff < 1) return { key: 'today', label: 'Hoje', cls: 'urgency-today' };
      if (diff < 2) return { key: 'tomorrow', label: 'Amanha', cls: 'urgency-tomorrow' };
      if (diff < 3) return { key: 'soon', label: `${Math.ceil(diff)}d`, cls: 'urgency-soon' };
      if (diff < 7) return { key: 'week', label: `${Math.ceil(diff)}d`, cls: 'urgency-week' };
      return { key: 'later', label: `${Math.ceil(diff)}d`, cls: 'urgency-later' };
    }

    function formatDateShort(iso) {
      if (!iso) return 'Sem prazo';
      return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    // ── Tabs ──

    let activeTab = 'week';

    function getTabCounts() {
      const actionable = getAllItems().filter(a => ACTIONABLE_TYPES.has(a.type));
      const materials = getAllItems().filter(a => MATERIAL_TYPES.has(a.type) || a.type === 'forum');
      let all = 0, past = 0, week = 0, later = 0;
      actionable.forEach(a => {
        all++;
        if (!a.due_date) { later++; return; }
        const diff = (new Date(a.due_date) - NOW) / MS_DAY;
        if (diff < 0) past++;
        else if (diff < 7) week++;
        else later++;
      });
      return { all, past, week, later, materials: materials.length };
    }

    function renderTabs() {
      const c = getTabCounts();
      const tabs = [
        { id: 'all', label: 'Todas', count: c.all },
        { id: 'week', label: 'Esta Semana', count: c.week },
        { id: 'later', label: 'Mais Pra Frente', count: c.later },
        { id: 'past', label: 'Passadas', count: c.past },
        { id: 'materials', label: 'Materiais de Leitura', count: c.materials },
      ];

      document.getElementById('tabs').innerHTML = tabs.map(t =>
        `<button class="tab${t.id === activeTab ? ' active' : ''}" data-tab="${t.id}">${t.label}<span class="count">${t.count}</span></button>`
      ).join('');

      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTab = btn.dataset.tab;
          renderTabs();
          renderList();
        });
      });
    }

    // ── To-Do List ──

    function renderList() {
      const container = document.getElementById('listContainer');
      const search = document.getElementById('searchInput').value.toLowerCase();

      if (activeTab === 'materials') {
        renderMaterials(container, search);
        return;
      }

      let items = getAllItems().filter(a => ACTIONABLE_TYPES.has(a.type));

      if (activeTab === 'all') {
        // keeps all actionable items without date-based filtering
      } else if (activeTab === 'past') {
        items = items.filter(a => a.due_date && (new Date(a.due_date) - NOW) / MS_DAY < 0);
      } else if (activeTab === 'week') {
        items = items.filter(a => {
          if (!a.due_date) return false;
          const diff = (new Date(a.due_date) - NOW) / MS_DAY;
          return diff >= 0 && diff < 7;
        });
      } else {
        items = items.filter(a => {
          if (!a.due_date) return true;
          return (new Date(a.due_date) - NOW) / MS_DAY >= 7;
        });
      }

      if (search) items = items.filter(a =>
        a.name.toLowerCase().includes(search) || a.courseName.toLowerCase().includes(search)
      );

      items.sort((a, b) => {
        if (!a.due_date && !b.due_date) return 0;
        if (!a.due_date) return 1;
        if (!b.due_date) return -1;
        return new Date(a.due_date) - new Date(b.due_date);
      });

      if (items.length === 0) {
        const emptyMsg = {
          all: 'Nenhuma entrega encontrada.',
          week: 'Nenhuma entrega esta semana. Aproveite para adiantar!',
          later: 'Nenhuma entrega futura encontrada.',
          past: 'Nenhuma entrega com prazo encerrado.',
        }[activeTab] || 'Nenhuma entrega nesta faixa.';
        container.innerHTML = `<div class="empty-state">${emptyMsg}</div>`;
        return;
      }

      container.innerHTML = `<ul class="todo-list">${items.map(a => {
        const u = urgency(a.due_date);
        const deadlineColor = { past: 'var(--text-dim)', today: 'var(--red)', tomorrow: 'var(--orange)', soon: 'var(--orange)', week: 'var(--yellow)', later: 'var(--green)', nodate: 'var(--text-dim)' }[u.key];
        return `<li class="todo-item">
          <div class="todo-body">
            <div class="todo-title">
              <a href="${a.url}" target="_blank" rel="noopener">${a.name}</a>
              ${u.label ? `<span class="todo-urgency ${u.cls}">${u.label}</span>` : ''}
            </div>
            <div class="todo-meta">
              <span>${a.courseName}</span>
              <span>${a.type === 'assignment' ? 'Tarefa' : a.type === 'quiz' ? 'Questionario' : a.type.charAt(0).toUpperCase() + a.type.slice(1)}</span>
            </div>
          </div>
          <div class="todo-deadline" style="color:${deadlineColor}">${formatDateShort(a.due_date)}</div>
        </li>`;
      }).join('')}</ul>`;
    }

    // ── Materials ──

    function renderMaterials(container, search) {
      let html = '';
      DATA.courses.forEach(c => {
        let items = c.activities.filter(a => MATERIAL_TYPES.has(a.type) || a.type === 'forum');
        if (search) items = items.filter(a => a.name.toLowerCase().includes(search) || c.name.toLowerCase().includes(search));
        if (items.length === 0) return;

        html += `<div class="materials-group"><h3>${c.name}</h3>`;
        items.forEach(a => {
          const icon = MATERIAL_ICONS[a.type] || '📎';
          html += `<div class="material-item">
            <span class="material-icon">${icon}</span>
            <div class="material-name"><a href="${a.url}" target="_blank" rel="noopener">${a.name}</a></div>
          </div>`;
        });
        html += `</div>`;
      });

      container.innerHTML = html || '<div class="empty-state">Nenhum material encontrado.</div>';
    }

    // ── Calendar ──

    let calInstance = null;

    const listSvg = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="0.5" fill="currentColor"/><circle cx="3" cy="12" r="0.5" fill="currentColor"/><circle cx="3" cy="18" r="0.5" fill="currentColor"/></svg>`;
    const gridSvg = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="4" x2="9" y2="9"/><line x1="15" y1="4" x2="15" y2="9"/></svg>`;

    function updateCalViewBtn(currentView) {
      const isGrid = currentView === 'dayGridMonth';
      document.getElementById('calViewToggle').innerHTML = isGrid
        ? `${listSvg} LISTA`
        : `${gridSvg} MÊS`;
    }

    function renderCalendar() {
      const events = [];
      DATA.courses.forEach(c => {
        c.activities.forEach(a => {
          if (a.due_date) {
            events.push({
              title: a.name,
              start: a.due_date.substring(0, 10),
              allDay: true,
              url: a.url,
              color: courseColorMap[c.id],
              extendedProps: { course: c.name, dueDate: a.due_date },
            });
          }
        });
      });

      const initialView = window.innerWidth < 800 ? 'listMonth' : 'dayGridMonth';

      calInstance = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView,
        locale: 'pt-br',
        height: 'auto',
        headerToolbar: { left: 'prev,next', center: 'title', right: '' },
        displayEventTime: false,
        eventDisplay: 'block',
        events,
        eventClick(info) {
          if (info.event.url) { info.jsEvent.preventDefault(); window.open(info.event.url, '_blank'); }
        },
        eventDidMount(info) {
          const due = new Date(info.event.extendedProps.dueDate);
          const timeStr = due.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          info.el.title = `${info.event.extendedProps.course}: ${info.event.title} (até ${timeStr})`;
        },
      });
      calInstance.render();
      updateCalViewBtn(initialView);

      document.getElementById('calViewToggle').addEventListener('click', () => {
        const current = calInstance.view.type;
        const next = current === 'dayGridMonth' ? 'listMonth' : 'dayGridMonth';
        calInstance.changeView(next);
        updateCalViewBtn(next);
      });

      document.getElementById('calendarLegend').innerHTML = DATA.courses.map(c =>
        `<span class="legend-item"><span class="legend-dot" style="background:${courseColorMap[c.id]}"></span><span>${c.name}</span></span>`
      ).join('');
    }

    // ── Theme toggle ──

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const isDark = theme === 'dark';
      const sunSvg = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>`;
      const moonSvg = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      document.getElementById('themeToggle').innerHTML = isDark
        ? `${sunSvg} LIGHT`
        : `${moonSvg} DARK`;
      localStorage.setItem('theme', theme);
    }

    applyTheme(document.documentElement.getAttribute('data-theme') || 'dark');

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    // ── Init ──

    document.getElementById('searchInput').addEventListener('input', () => renderList());

    renderTabs();
    renderList();
    renderCalendar();
  </script>
</body>
</html>
